name: Bug report
description: Report reproducible incorrect behaviour
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for providing a reproducible report.
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe the observed and expected behaviour.
    validations:
      required: true
  - type: textarea
    id: reprex
    attributes:
      label: Minimal reproducible example
      description: Include data-generation code where possible.
      render: r
    validations:
      required: true
  - type: textarea
    id: session
    attributes:
      label: Session information
      description: Paste the output of sessionInfo().
      render: text
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Verification
      options:
        - label: I removed confidential data and credentials.
          required: true
        - label: I checked that the problem is not already reported.
          required: true
