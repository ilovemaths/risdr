name: Feature request
description: Propose a statistically justified extension
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: need
    attributes:
      label: Research or user need
      description: Explain the problem the proposed feature would address.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed interface
      description: Describe the expected inputs, outputs, and compatibility implications.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Methodological references
      description: Provide traceable literature for a statistical method.
    validations:
      required: false
