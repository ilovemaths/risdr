      - evaluate_prediction
      - evaluate_prediction_cv
      - rmse
      - mae
      - mape
      - r_squared
      - adjusted_r_squared
      - prediction_correlation
  - title: Slicing and simulation
    contents:
      - make_slices
      - starts_with("slice_")
      - simulate_risdr_data
      - run_one_simulation
      - run_risdr_simulation
      - summarise_simulation
