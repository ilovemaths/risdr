template:
  bootstrap: 5
  bootswatch: flatly

development:
  mode: auto

home:
  title: risdr
  description: >
    Regularised sufficient dimension reduction with covariance stabilisation,
    information-theoretic structural dimension selection, prediction, and
    simulation tools.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search]

articles:
  - title: Core workflow
    navbar: Core workflow
    contents:
      - getting-started
      - epi-case-study
  - title: Methods
    navbar: Methods
    contents:
      - covariance-regularisation
      - structural-dimension-selection
      - simulation-study

reference:
  - title: Package overview
    contents:
      - risdr-package
  - title: Model fitting and methods
    contents:
      - fit_risdr
      - starts_with("compute_")
      - extract_loadings
      - starts_with("predict.")
      - starts_with("summary.")
      - starts_with("print.")
  - title: Covariance estimation and stabilisation
    contents:
      - starts_with("cov_")
      - estimate_cov
      - starts_with("stabilize_")
  - title: Structural dimension selection
    contents:
      - select_dimension
      - choose_dimension
      - criterion_weights
      - select_dimension_cv
      - select_dimension_cv_icomp
      - select_dimension_ladle
      - make_cv_folds
      - starts_with("plot_")
  - title: Prediction and assessment
    contents:
      - fit_downstream_lm
